version: '3.8'

services:
  # 1. Service API Machine Learning (FastAPI + Exporter)
  fastapi_app:
    image: python:3.12.7-slim
    container_name: sml_fastapi
    working_dir: /app
    # Me-mount folder saat ini ke dalam container agar bisa membaca inference.py & model.pkl
    volumes:
      - .:/app
    # Otomatis menginstal dependensi dan menjalankan server saat container up
    command: >
      bash -c "pip install --no-cache-dir fastapi uvicorn prometheus-client psutil pandas numpy scikit-learn && uvicorn inference:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    restart: unless-stopped

  # 2. Service Prometheus (Penarik Metrik)
  prometheus:
    image: prom/prometheus:latest
    container_name: sml_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - fastapi_app
    # Menjembatani localhost host OS dengan localhost container agar prometheus.yml membaca target yang benar
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # 3. Service Grafana (Visualisasi & Alerting)
  grafana:
    image: grafana/grafana:latest
    container_name: sml_grafana
    ports:
      - "3000:3000"
    environment:
      # Password default diset menjadi admin agar mudah diakses
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped