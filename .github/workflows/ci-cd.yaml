name: MLflow CI/CD Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
  # 3 baris ini ngasih tau MLflow CLI untuk sedot model dari DagsHub
  MLFLOW_TRACKING_URI: https://dagshub.com/luckyprdn/Eksperimen_SML_Lucky.mlflow
  MLFLOW_TRACKING_USERNAME: luckyprdn
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_USER_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install "mlflow<3" virtualenv dagshub pandas numpy scikit-learn

      - name: Generate Dataset (Bypass File Not Found)
        run: |
          cd Eksperimen_SML_Lucky
          python automate.py
          cd ..
          mkdir -p Membangun_model/dataset
          cp Eksperimen_SML_Lucky/dataset/* Membangun_model/dataset/

      - name: Run Training Script
        run: |
          cd Workflow-CI
          python modelling.py

      - name: Verify Run Exists on DagsHub (debug step)
        run: |
          cd Workflow-CI
          RUN_ID=$(cat run_id.txt)
          echo "RUN_ID = $RUN_ID"
          echo "Tracking URI aktif: $MLFLOW_TRACKING_URI"
          mlflow runs describe --run-id "$RUN_ID"

      - name: Build Docker Image
        run: |
          cd Workflow-CI
          RUN_ID=$(cat run_id.txt)
          mlflow models build-docker -m "runs:/$RUN_ID/model_pipeline" -n "${{ secrets.DOCKER_USERNAME }}/sml-breast-cancer:latest" --env-manager local

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: docker push "${{ secrets.DOCKER_USERNAME }}/sml-breast-cancer:latest"
