name: MLflow CI/CD Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install Dependencies
        run: pip install mlflow virtualenv dagshub pandas numpy scikit-learn

      - name: Generate Dataset (Bypass File Not Found)
        run: |
          cd Eksperimen_SML_Lucky
          python automate.py
          cd ..
          mkdir -p Membangun_model/dataset
          cp Eksperimen_SML_Lucky/dataset/* Membangun_model/dataset/

      - name: Run Training Script
        run: |
          cd Workflow-CI
          python modelling.py

      - name: Build Docker Image
        run: |
          cd Workflow-CI
          RUN_ID=$(cat run_id.txt)
          mlflow models build-docker -m "runs:/$RUN_ID/model_pipeline" -n ${{ secrets.DOCKER_USERNAME }}/sml-breast-cancer:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/sml-breast-cancer:latest
